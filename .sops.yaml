# sops-nix recipients for the demo + relay hosts.
# Admin keys (edit secrets) + each box's pre-generated SSH host key (decrypt at
# runtime; private key installed via nixos-anywhere --extra-files at provision time).
keys:
  - &admin_devbox age1xz9atq0879saqq5r8a23374gv4s5sxyyxg738rw0ljhwemahm52q8jndvf
  - &admin_macbook age1j3vprddaxegenp4dwkt7mcmyhxuhpghnn6kljl0535gq2jkgqghs83zlve
  - &host_demo age1un7lute5hqsx7lgj8hrx26xj58pn9jhnz7w3m6huv2l3ttrj7g7qj5fcw0
  - &host_relay age1wvf6v3dssj7ql78f74mmfs7mnnzpd9fxwendyv08w47uf3slzqqqk9xr0x
  - &host_bougierepo age1ukydq282r3lk35gnrmnmudwxkspe8vg2qvrj8euj7dz5mkvqddlq9aw9jm
creation_rules:
  - path_regex: secrets/demo(\.ya?ml|/[^/]+)$
    key_groups:
      - age:
          - *admin_devbox
          - *admin_macbook
          - *host_demo
  - path_regex: secrets/relay(\.ya?ml|/[^/]+)$
    key_groups:
      - age:
          - *admin_devbox
          - *admin_macbook
          - *host_relay
  - path_regex: secrets/bougierepo(\.ya?ml|/[^/]+)$
    key_groups:
      - age:
          - *admin_devbox
          - *admin_macbook
          - *host_bougierepo
